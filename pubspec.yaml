name: cocolytics
description: "Innovative AI-powered Coconut disease detection and environmental monitoring tool by Chanuja."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  uuid: ^4.5.1
  flutter_tts: ^4.2.3
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  cloudinary_public: ^0.23.1
  go_router: ^17.1.0
  tflite_flutter: ^0.12.1
  image: ^4.1.4
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_markdown: ^0.7.3
  camera: ^0.10.5+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/cocolytic-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/cocolytic-logo.png
    - assets/cocolytic-brand.png
    - assets/coconut_model.tflite
    - assets/coconut-tree.png
    - assets/icon.jpeg
